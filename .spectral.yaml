rules:
  # Built-in function referenced by string name — this is the exact case
  # that buildFunctionMap/resolveRuleFunctions were meant to handle.
  no-x-internal-in-paths:
    message: "Paths must not contain x-internal extensions"
    severity: warn
    given: "$.paths[*]"
    then:
      field: "x-internal"
      function: falsy

  # Custom rule with no built-in function dependency — should always work.
  info-contact-required:
    message: "Info object must have a contact field!"
    severity: error
    given: "$.info"
    then:
      field: contact
      function: truthy
